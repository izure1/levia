<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lve4 - ⑫ 크로스페이드 (Transition)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a14;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #back {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #555;
      font-size: 12px;
      text-decoration: none;
      z-index: 100;
    }

    #back:hover {
      color: #7ec8e3;
    }
  </style>
</head>

<body>
  <a id="back" href="../">← 목록으로</a>
  <script type="module" src="./main.js"></script>
</body>

</html>
