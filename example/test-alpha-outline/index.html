<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leviar – ⑳ 알파 외곽선 테스트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0d14;
      color: #d0d4de;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 270px;
      height: 100vh;
      overflow-y: auto;
      background: rgba(14, 17, 30, 0.82);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.07);
      padding: 20px 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #sidebar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #7ec8e3;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* ── 효과 카드 ── */
    .effect-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .effect-card.active {
      border-color: rgba(126,200,227,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header label {
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }
    .card-header input[type=checkbox] {
      width: 14px; height: 14px;
      accent-color: #7ec8e3;
      cursor: pointer;
    }

    /* ── 슬라이더 ── */
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #7b8099;
    }
    .row span { width: 70px; white-space: nowrap; }
    .row .val { width: 30px; text-align: right; color: #c0c4d0; }
    .row input[type=range] {
      flex: 1;
      accent-color: #7ec8e3;
      height: 4px;
      cursor: pointer;
    }
    .row input[type=color] {
      width: 28px; height: 22px;
      border: none; border-radius: 4px;
      cursor: pointer; background: none;
      padding: 0;
    }

    /* ── 리셋 ── */
    #reset-btn {
      margin-top: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #7b8099;
      font-size: 12px;
      padding: 7px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #reset-btn:hover { background: rgba(255,255,255,0.1); color: #d0d4de; }

    /* ── 뒤로 링크 ── */
    #back {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      color: #444;
      font-size: 11px;
      text-decoration: none;
      z-index: 200;
      letter-spacing: 0.04em;
    }
    #back:hover { color: #7ec8e3; }
  </style>
</head>

<body>

  <!-- ── 사이드바 컨트롤 ─────────────────────────────────────────────── -->
  <aside id="sidebar">
    <h1>⑳ Alpha Outline</h1>

    <!-- border -->
    <div class="effect-card" id="card-border">
      <div class="card-header">
        <input type="checkbox" id="cb-border" />
        <label for="cb-border">Border</label>
        <input type="color" id="border-color" value="#ff5050" />
      </div>
      <div class="row">
        <span>Width</span>
        <input type="range" id="border-width" min="1" max="16" value="4" step="1" />
        <span class="val" id="border-width-val">4</span>
      </div>
    </div>

    <!-- outline -->
    <div class="effect-card" id="card-outline">
      <div class="card-header">
        <input type="checkbox" id="cb-outline" />
        <label for="cb-outline">Outline</label>
        <input type="color" id="outline-color" value="#00f0c8" />
      </div>
      <div class="row">
        <span>Width</span>
        <input type="range" id="outline-width" min="1" max="16" value="4" step="1" />
        <span class="val" id="outline-width-val">4</span>
      </div>
    </div>

    <!-- boxShadow -->
    <div class="effect-card" id="card-shadow">
      <div class="card-header">
        <input type="checkbox" id="cb-shadow" />
        <label for="cb-shadow">Box Shadow</label>
        <input type="color" id="shadow-color" value="#7800dc" />
      </div>
      <div class="row">
        <span>Blur</span>
        <input type="range" id="shadow-blur" min="0" max="40" value="16" step="1" />
        <span class="val" id="shadow-blur-val">16</span>
      </div>
      <div class="row">
        <span>Spread</span>
        <input type="range" id="shadow-spread" min="0" max="20" value="0" step="1" />
        <span class="val" id="shadow-spread-val">0</span>
      </div>
      <div class="row">
        <span>Offset X</span>
        <input type="range" id="shadow-ox" min="-30" max="30" value="0" step="1" />
        <span class="val" id="shadow-ox-val">0</span>
      </div>
      <div class="row">
        <span>Offset Y</span>
        <input type="range" id="shadow-oy" min="-30" max="30" value="0" step="1" />
        <span class="val" id="shadow-oy-val">0</span>
      </div>
    </div>

    <button id="reset-btn">모두 초기화</button>
  </aside>

  <a id="back" href="../">← 목록으로</a>
  <script type="module" src="./main.js"></script>
</body>

</html>
