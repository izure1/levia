<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levia - ⑮ 재생 속성 제어</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a14;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    #back {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #555;
      font-size: 12px;
      text-decoration: none;
      z-index: 100;
    }

    #back:hover {
      color: #7ec8e3;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      padding: 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 300px;
    }

    button {
      margin-top: 8px;
      padding: 6px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>

<body>
  <div id="ui">
    <label>
      Sprite fps:
      <input type="range" id="spr-rate" min="0" max="60" value="10">
      <span id="spr-rate-val">10</span>
    </label>

    <label>
      Video Rate:
      <input type="range" id="vid-rate" min="0" max="3" step="0.1" value="1">
      <span id="vid-rate-val">1.0</span>x
    </label>

    <label>
      Video Volume:
      <input type="range" id="vid-vol" min="0" max="1" step="0.1" value="1">
      <span id="vid-vol-val">1.0</span>
    </label>

    <button id="btn-spr-seek">Sprite currentTime = 0 (처음으로)</button>
    <button id="btn-vid-seek">Video currentTime = 5.0 (5초로 이동)</button>
  </div>

  <a id="back" href="../">← 목록으로</a>
  <script type="module" src="./main.js"></script>
</body>

</html>
